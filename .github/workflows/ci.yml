# ==============================================================================
# KnowledgeHub AI - Continuous Integration Workflow
# ==============================================================================
name: Continuous Ingestion & Quality Gates

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-qa:
    name: Backend Lint & Unit Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: secure_postgres_password_here
          POSTGRES_DB: knowledgehub
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:v1.9.0
        ports:
          - 6333:6333
          - 6334:6334

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Lint with Ruff
        run: |
          # stop the build if there are Python syntax errors or undefined names
          ruff check backend/app/

      - name: Run Backend Tests
        env:
          ENVIRONMENT: test
          DATABASE_URL: postgresql+asyncpg://postgres:secure_postgres_password_here@localhost:5432/knowledgehub
          QDRANT_HOST=localhost
          JWT_SECRET_KEY=test_jwt_secret_key_random_value_generation
          GEMINI_API_KEY=mock_key
        run: |
          cd backend
          python -m pytest ../tests/backend/unit/ -v

  frontend-qa:
    name: Frontend Lint & Build Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Verify Type Safety (tsc)
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build Production Bundle
        run: |
          cd frontend
          npm run build
